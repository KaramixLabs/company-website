<svg xmlns="http://www.w3.org/2000/svg" width="560" height="144" viewBox="0 0 560 144" role="img" aria-labelledby="title desc">
  <title id="title">Karamix Labs</title>
  <desc id="desc">Primary Karamix Labs logo with KL monogram.</desc>
  <defs>
    <linearGradient id="kl-gradient" x1="12" y1="18" x2="126" y2="132" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff1f63"/>
      <stop offset="1" stop-color="#19d3ff"/>
    </linearGradient>
    <filter id="kl-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.6 0 1 0 0 0.1 0 0 1 0 0.5 0 0 0 .45 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="560" height="144" rx="24" fill="#100f16"/>
  <circle cx="72" cy="72" r="46" fill="url(#kl-gradient)" filter="url(#kl-glow)"/>
  <circle cx="72" cy="72" r="38" fill="#100f16"/>
  <text x="72" y="83" text-anchor="middle" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">KL</text>
  <text x="144" y="67" fill="#fff" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="36" font-weight="700">Karamix Labs</text>
  <text x="146" y="96" fill="#c8c0d6" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Mobile Applications • Web Interfaces • Digital Systems</text>
</svg>
